kind = "web"
previewPath = "/"
title = "AfraLink"
version = "1.0.0"
id = "artifacts/afralink"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19602

[services.development]
run = "pnpm --filter @workspace/afralink run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/afralink", "run", "build" ]
publicDir = "artifacts/afralink/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19602"
BASE_PATH = "/"
